<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Devarakondi Silks</title>
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { background: var(--color-primary); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8) var(--sp-4);
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0505 0%, #2a0a0a 50%, #1c0808 100%);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: -30%; right: -10%;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--color-white);
      border-radius: var(--radius-xl);
      padding: var(--sp-10) var(--sp-10);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      position: relative;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: var(--sp-8);
    }
    .auth-logo-name {
      font-family: var(--font-heading);
      font-size: var(--fs-2xl);
      font-weight: 400;
      color: var(--color-primary);
      letter-spacing: 0.02em;
    }
    .auth-logo-tagline {
      font-size: var(--fs-xs);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-top: 4px;
    }
    .auth-ornament {
      width: 40px; height: 1px;
      background: var(--color-gold);
      margin: var(--sp-4) auto;
    }
    .auth-title {
      font-family: var(--font-heading);
      font-size: var(--fs-2xl);
      font-weight: 400;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: var(--sp-2);
    }
    .auth-subtitle {
      font-size: var(--fs-sm);
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: var(--sp-8);
    }
    .auth-form { display: flex; flex-direction: column; gap: var(--sp-5); }
    .auth-field { display: flex; flex-direction: column; gap: var(--sp-2); }
    .auth-label {
      font-size: var(--fs-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--color-primary);
    }
    .auth-input {
      width: 100%;
      box-sizing: border-box;
      padding: var(--sp-4) var(--sp-5);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--fs-base);
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-white);
      transition: border-color var(--transition-fast);
      outline: none;
    }
    .auth-input:focus { border-color: var(--color-gold); }
    .auth-input::placeholder { color: var(--color-text-muted); }
    .auth-btn {
      padding: var(--sp-4);
      background: var(--color-primary);
      color: var(--color-gold);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-heading);
      font-size: var(--fs-base);
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .auth-btn:hover { background: #2a0a0a; transform: translateY(-1px); }
    .auth-divider {
      display: flex; align-items: center; gap: var(--sp-3);
      color: var(--color-text-muted); font-size: var(--fs-xs);
      margin: var(--sp-2) 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--color-border);
    }
    .auth-link-row {
      text-align: center;
      font-size: var(--fs-sm);
      color: var(--color-text-muted);
      margin-top: var(--sp-4);
    }
    .auth-link-row a {
      color: var(--color-gold);
      font-weight: 600;
      text-decoration: underline;
    }
    .auth-error {
      background: #FEE2E2;
      border: 1px solid #FECACA;
      color: #991B1B;
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--radius-sm);
      font-size: var(--fs-sm);
      display: none;
    }
    @media (max-width: 480px) {
      .auth-card { padding: var(--sp-8) var(--sp-6); }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card reveal fade-up">
    <div class="auth-logo">
      <div class="auth-logo-name">Devarakondi Silks</div>
      <div class="auth-logo-tagline">Molakalmur · Est. Heritage</div>
      <div class="auth-ornament"></div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to track your orders and wishlist</p>

    <div class="auth-error" id="auth-error">Invalid credentials. Please try again.</div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email">Email or Phone</label>
        <input class="auth-input" type="text" id="email" name="email" placeholder="you@example.com or 9876543210" required autocomplete="username">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">Password</label>
        <div style="position:relative;">
          <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" style="width:100%;padding-right:var(--sp-12);">
          <button type="button" id="toggle-pwd" style="position:absolute;right:var(--sp-4);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-muted);font-size:1rem;" aria-label="Show/hide password">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-top:calc(-1 * var(--sp-3))">
        <a href="#" style="font-size:var(--fs-sm);color:var(--color-gold);">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn" id="login-btn">Sign In →</button>
    </form>

    <div class="auth-divider" style="margin-top:var(--sp-6)">or</div>

    <div class="auth-link-row">
      New to Devarakondi Silks? <a href="signup.html">Create Account</a>
    </div>
    <div class="auth-link-row" style="margin-top:var(--sp-3)">
      <a href="index.html" style="color:var(--color-text-muted);">← Back to Home</a>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  // Toggle password visibility
  document.getElementById('toggle-pwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
  });

  // Form submit — wire to backend when auth is ready
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('auth-error');
    errorEl.style.display = 'none';
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('http://localhost:8080/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('ds_token', data.token);
        localStorage.setItem('ds_user', JSON.stringify({ name: data.name, email: data.email }));
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = 'Invalid email or password. Please try again.';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      // Backend not available — show friendly message
      errorEl.textContent = 'Could not connect to server. Please try again later.';
      errorEl.style.display = 'block';
    } finally {
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
